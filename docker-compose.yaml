services:
  db:
    image: postgres:15-alpine # 使用最新稳定版的 PostgreSQL 镜像
    container_name: postgres_container
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: hxzydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

volumes:
  postgres_data:
  pgadmin_data: